trtri:
  description: "Triangular matrix inversion"
  api_group: "LIN"
  labels: []
  precisions: [s, d, c, z]
  param_order: [uplo, diag, n, lda, repeats]

  custom_paths:
    - name: single_element
      precisions: sdcz
      labels: []
      params: {uplo: U, diag: N, n: 1, lda: 1, repeats: 1}

    - name: kernel_sizes_2_16
      precisions: sdcz
      labels: []
      params: {uplo: U, diag: N, repeats: 1, square: {range: [2, 16]}}

    - name: medium_square
      precisions: sdcz
      labels: []
      params: {uplo: U, diag: N, n: 128, lda: 128, repeats: 1}

    - name: large_square
      precisions: sdcz
      labels: []
      params: {uplo: U, diag: N, n: 256, lda: 256, repeats: 1}

    - name: lower_triangular_diag_U_64x64
      precisions: sdcz
      labels: []
      params: {uplo: L, diag: U, n: 64, lda: 64, repeats: 1}