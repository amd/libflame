larfg:
  description: "Generate elementary reflector"
  api_group: "AUX"
  labels: []
  precisions: [s, d, c, z]
  param_order: [n, alpha_real, alpha_imag, incx, repeats]

  custom_paths:
    - name: single_element
      precisions: sdcz
      labels: []
      params: {n: 1, repeats: 1, alpha_real: 0.0, alpha_imag: 0.0, incx: 1}

    - name: kernel_sizes_2_16
      precisions: sdcz
      labels: []
      params: {repeats: 1, alpha_real: 0.0, alpha_imag: 0.0, incx: 1, square: {range: [2, 16]}}

    - name: medium
      precisions: sdcz
      labels: []
      params: {n: 50, alpha_real: 1.0, alpha_imag: 0.0, incx: 1, repeats: 1}

    - name: large
      precisions: sdcz
      labels: []
      params: {n: 128, alpha_real: 1.0, alpha_imag: 0.0, incx: 1, repeats: 1}

    - name: very_large
      precisions: sdcz
      labels: []
      params: {n: 256, alpha_real: 1.0, alpha_imag: 0.0, incx: 1, repeats: 1}