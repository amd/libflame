getrf:
  description: "LU factorization with pivoting"
  api_group: "LIN"
  labels: []
  precisions: [s, d, c, z]
  param_order: [m, n, lda, repeats]

  custom_paths:
    - name: single_element
      precisions: sdcz
      labels: []
      params: {m: 1, n: 1, lda: 1, repeats: 1}

    - name: kernel_sizes_2_16
      precisions: sdcz
      labels: []
      params: {repeats: 1, square: {range: [2, 16]}}

    - name: sd_avx512_optimized
      precisions: sd
      labels: [avx512]
      params: {m: 32, n: 32, lda: 32, repeats: 1}

    - name: cz_small_lapack
      precisions: cz
      labels: []
      params: {m: 64, n: 64, lda: 64, repeats: 1}

    - name: sd_rectangular_tall
      precisions: sd
      labels: []
      params: {m: 50, n: 30, lda: 50, repeats: 1}

    - name: sd_rectangular_wide
      precisions: sd
      labels: []
      params: {m: 30, n: 50, lda: 30, repeats: 1}

    - name: cz_rectangular_tall
      precisions: cz
      labels: []
      params: {m: 100, n: 50, lda: 100, repeats: 1}

    - name: boundary_96x96
      precisions: sdcz
      labels: []
      params: {m: 96, n: 96, lda: 96, repeats: 1}

    - name: memory_padded_33x33
      precisions: sdcz
      labels: []
      params: {m: 33, n: 33, lda: 40, repeats: 1}

    - name: memory_padded_65x65
