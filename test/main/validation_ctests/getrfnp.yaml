      precisions: sdcz
      labels: []
      params: {m: 12, n: 12, lda: 12, repeats: 1}

    - name: medium_square
      precisions: sdcz
      labels: []
      params: {m: 50, n: 50, lda: 50, repeats: 1}

    - name: medium_rectangular_tall
      precisions: sdcz
      labels: []
      params: {m: 80, n: 50, lda: 80, repeats: 1}

    - name: medium_rectangular_wide
      precisions: sdcz
