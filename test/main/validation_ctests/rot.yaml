rot:
  description: "Plane rotation"
  api_group: "AUX"
  labels: []
  precisions: [s, d, c, z]
  param_order: [n, incx, incy, repeats]

  custom_paths:
    - name: single_element
      precisions: sdcz
      labels: []
      params: {n: 1, repeats: 1, incx: 1, incy: 1}

    - name: kernel_sizes_2_16
      precisions: sdcz
      labels: []
      params: {repeats: 1, incx: 1, incy: 1, square: {range: [2, 16]}}

    - name: incx_2_incy_2
      precisions: sdcz
      labels: []
      params: {n: 50, incx: 2, incy: 2, repeats: 1}

    - name: incx_negative
      precisions: sdcz
      labels: []
      params: {n: 50, incx: -1, incy: 1, repeats: 1}

    - name: incy_negative
      precisions: sdcz
      labels: []
      params: {n: 50, incx: 1, incy: -1, repeats: 1}