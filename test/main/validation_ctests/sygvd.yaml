sygvd:
  description: "Generalized symmetric/Hermitian eigenvalue decomposition"
  api_group: "EIG"
  labels: []
  precisions: [s, d, c, z]
  param_order: [itype, jobz, uplo, n, lda, ldb, lwork, liwork, repeats]

  custom_paths:
    - name: single_element
      precisions: sdcz
      labels: []
      params: {itype: 1, jobz: N, uplo: U, n: 1, lda: 1, ldb: 1, lwork: -1, repeats: 1, liwork: -1}

    - name: kernel_sizes_2_16
      precisions: sdcz
      labels: []
      params: {itype: 1, jobz: N, uplo: U, lwork: -1, repeats: 1, square: {range: [2, 16]}, liwork: -1}

    - name: itype_1_no_vectors_upper
      precisions: sdcz
      labels: []
      params: {itype: 1, jobz: N, uplo: U, n: 50, lda: 50, ldb: 50, lwork: -1, liwork: -1, repeats: 1}

    - name: itype_1_with_vectors_upper
      precisions: sdcz
      labels: []
      params: {itype: 1, jobz: V, uplo: U, n: 50, lda: 50, ldb: 50, lwork: -1, liwork: -1, repeats: 1}

    - name: itype_2_with_vectors_upper
      precisions: sdcz
      labels: []
      params: {itype: 2, jobz: V, uplo: U, n: 50, lda: 50, ldb: 50, lwork: -1, liwork: -1, repeats: 1}

    - name: itype_3_with_vectors_upper
      precisions: sdcz
      labels: []
      params: {itype: 3, jobz: V, uplo: U, n: 50, lda: 50, ldb: 50, lwork: -1, liwork: -1, repeats: 1}

    - name: itype_1_with_vectors_lower
      precisions: sdcz
      labels: []
      params: {itype: 1, jobz: V, uplo: L, n: 50, lda: 50, ldb: 50, lwork: -1, liwork: -1, repeats: 1}

    - name: medium_square
      precisions: sdcz
