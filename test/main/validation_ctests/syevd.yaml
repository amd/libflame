syevd:
  description: "Symmetric/Hermitian eigenvalue decomposition using divide and conquer"
  api_group: "EIG"
  labels: []
  precisions: [s, d, c, z]
  param_order: [jobz, uplo, n, lda, lwork, liwork, lrwork, repeats]

  custom_paths:
    - name: single_element
      precisions: sdcz
      labels: []
      params: {jobz: N, uplo: U, n: 1, lda: 1, lwork: -1, repeats: 1, liwork: -1, lrwork: -1}

    - name: kernel_sizes_2_16
      precisions: sdcz
      labels: []
      params: {jobz: N, uplo: U, lwork: -1, repeats: 1, liwork: -1, lrwork: -1, square: {range: [2, 16]}}

    - name: no_vectors_upper
      precisions: sdcz
      labels: []
      params: {jobz: N, uplo: U, n: 50, lda: 50, lwork: -1, liwork: -1, lrwork: -1, repeats: 1}

    - name: compute_vectors_upper
      precisions: sdcz
      labels: []
      params: {jobz: V, uplo: U, n: 50, lda: 50, lwork: -1, liwork: -1, lrwork: -1, repeats: 1}

    - name: no_vectors_lower
      precisions: sdcz
      labels: []
      params: {jobz: N, uplo: L, n: 50, lda: 50, lwork: -1, liwork: -1, lrwork: -1, repeats: 1}

    - name: compute_vectors_lower
      precisions: sdcz
      labels: []
      params: {jobz: V, uplo: L, n: 50, lda: 50, lwork: -1, liwork: -1, lrwork: -1, repeats: 1}

    - name: medium_square
      precisions: sdcz
      labels: []
      params: {jobz: V, uplo: U, n: 128, lda: 128, lwork: -1, liwork: -1, lrwork: -1, repeats: 1}

    - name: large_square
      precisions: sdcz
      labels: []
      params: {jobz: V, uplo: U, n: 256, lda: 256, lwork: -1, liwork: -1, lrwork: -1, repeats: 1}

    - name: kernel_sizes_2_16_with_vectors
      precisions: sdcz
      labels: []
      params: {jobz: V, uplo: U, lwork: -1, liwork: -1, lrwork: -1, repeats: 1, square: {range: [2, 16]}}

    - name: kernel_sizes_2_16_lower
      precisions: sdcz
      labels: []
      params: {jobz: N, uplo: L, lwork: -1, liwork: -1, lrwork: -1, repeats: 1, square: {range: [2, 16]}}

    - name: kernel_sizes_2_16_with_vectors_lower
      precisions: sdcz
      labels: []
      params: {jobz: V, uplo: L, lwork: -1, liwork: -1, lrwork: -1, repeats: 1, square: {range: [2, 16]}}