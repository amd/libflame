gels:
  description: "Linear least squares"
  api_group: "LIN"
  labels: []
  precisions: [s, d, c, z]
  param_order: [trans, m, n, nrhs, lda, ldb, lwork, repeats]

  custom_paths:
    - name: single_element
      precisions: sdcz
      labels: []
      params: {trans: N, m: 1, n: 1, nrhs: 1, lda: 1, ldb: 1, lwork: -1, repeats: 1}

    - name: kernel_sizes_2_16
      precisions: sdcz
      labels: []
      params: {trans: N, nrhs: 1, lwork: -1, repeats: 1, square: {range: [2, 16]}}

    - name: trans_n
      precisions: sdcz
      labels: []
      params: {trans: N, m: 50, n: 50, nrhs: 1, lda: 50, ldb: 50, lwork: -1, repeats: 1}

    - name: rectangular_tall
      precisions: sdcz
      labels: []
      params: {trans: N, m: 100, n: 50, nrhs: 1, lda: 100, ldb: 100, lwork: -1, repeats: 1}

    - name: rectangular_wide
      precisions: sdcz
      labels: []
      params: {trans: N, m: 50, n: 100, nrhs: 1, lda: 50, ldb: 100, lwork: -1, repeats: 1}

    - name: medium_square
      precisions: sdcz
      labels: []
      params: {trans: N, m: 128, n: 128, nrhs: 1, lda: 128, ldb: 128, lwork: -1, repeats: 1}

    - name: large_square
      precisions: sdcz
      labels: []
      params: {trans: N, m: 256, n: 256, nrhs: 1, lda: 256, ldb: 256, lwork: -1, repeats: 1}