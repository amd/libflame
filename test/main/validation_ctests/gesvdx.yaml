gesvdx:
  description: "Singular value decomposition"
  api_group: "SVD"
  labels: []
  precisions: [s, d, c, z]
  param_order: [jobu, jobvt, range, m, n, lda, vl, vu, il, iu, ldu, ldvt, lwork, repeats]

  custom_paths:
