geqp3:
  description: "QR factorization with column pivoting"
  api_group: "LIN"
  labels: []
  precisions: [s, d, c, z]
  param_order: [m, n, lda, lwork, repeats]

  custom_paths:
    - name: single_element
      precisions: sdcz
      labels: []
      params: {m: 1, n: 1, lda: 1, lwork: -1, repeats: 1}

    - name: kernel_sizes_2_16
      precisions: sdcz
      labels: []
      params: {lwork: -1, repeats: 1, square: {range: [2, 16]}}

    - name: rectangular_tall
      precisions: sdcz
      labels: []
      params: {m: 50, n: 30, lda: 50, lwork: -1, repeats: 1}

    - name: rectangular_wide
      precisions: sdcz
      labels: []
      params: {m: 30, n: 50, lda: 30, lwork: -1, repeats: 1}

    - name: medium_square
      precisions: sdcz
      labels: []
      params: {m: 64, n: 64, lda: 64, lwork: -1, repeats: 1}

    - name: very_large
      precisions: sdcz
      labels: []
      params: {m: 256, n: 256, lda: 256, lwork: -1, repeats: 1}