getri:
  description: "Matrix inversion"
  api_group: "LIN"
  labels: []
  precisions: [s, d, c, z]
  param_order: [n, lda, lwork, repeats]

  custom_paths:
    - name: single_element
      precisions: sdcz
      labels: []
      params: {n: 1, lda: 1, lwork: -1, repeats: 1}

    - name: kernel_sizes_2_16
      precisions: sdcz
      labels: []
      params: {lwork: -1, repeats: 1, square: {range: [2, 16]}}

    - name: medium_square
      precisions: sdcz
      labels: []
      params: {n: 64, lda: 64, lwork: -1, repeats: 1}

    - name: large_square
      precisions: sdcz
      labels: []
      params: {n: 128, lda: 128, lwork: -1, repeats: 1}

    - name: very_large
      precisions: sdcz
      labels: []
      params: {n: 256, lda: 256, lwork: -1, repeats: 1}