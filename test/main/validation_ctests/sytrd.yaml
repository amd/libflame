sytrd:
  description: "Symmetric/Hermitian tridiagonal reduction"
  api_group: "EIG"
  labels: []
  precisions: [s, d, c, z]
  param_order: [uplo, n, lda, lwork, repeats]

  custom_paths:
    - name: single_element
      precisions: sdcz
      labels: []
      params: {uplo: U, n: 1, lda: 1, lwork: -1, repeats: 1}

    - name: kernel_sizes_2_16
      precisions: sdcz
      labels: []
      params: {uplo: U, lwork: -1, repeats: 1, square: {range: [2, 16]}}

    - name: kernel_sizes_2_16_lower
      precisions: sdcz
      labels: []
      params: {uplo: L, lwork: -1, repeats: 1, square: {range: [2, 16]}}

    - name: upper_triangular
      precisions: sdcz
      labels: []
      params: {uplo: U, n: 50, lda: 50, lwork: -1, repeats: 1}

    - name: lower_triangular
      precisions: sdcz
      labels: []
      params: {uplo: L, n: 50, lda: 50, lwork: -1, repeats: 1}

    - name: medium_square_upper
      precisions: sdcz
      labels: []
      params: {uplo: U, n: 128, lda: 128, lwork: -1, repeats: 1}

    - name: large_square_upper
      precisions: sdcz
      labels: []
      params: {uplo: U, n: 256, lda: 256, lwork: -1, repeats: 1}

    - name: large_square_lower
      precisions: sdcz
      labels: []
      params: {uplo: L, n: 256, lda: 256, lwork: -1, repeats: 1}