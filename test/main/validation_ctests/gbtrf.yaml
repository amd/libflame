      precisions: sdcz
      labels: []
      params: {m: 1, n: 1, kl: 0, ku: 0, ldab: 1, repeats: 1}

    - name: kernel_sizes_2_16
      precisions: sdcz
      labels: []
      params: {kl: 0, ku: 0, repeats: 1, square: {range: [2, 16]}}

    - name: tridiagonal_small
      precisions: sdcz
      labels: []
      params: {m: 10, n: 10, kl: 1, ku: 1, ldab: 3, repeats: 1}

    - name: tridiagonal_medium
      precisions: sdcz
      labels: []
      params: {m: 50, n: 50, kl: 1, ku: 1, ldab: 3, repeats: 1}

    - name: tridiagonal_large
      precisions: sdcz
      labels: []
      params: {m: 128, n: 128, kl: 1, ku: 1, ldab: 3, repeats: 1}

    - name: pentadiagonal_medium
      precisions: sdcz
      labels: []
      params: {m: 50, n: 50, kl: 2, ku: 2, ldab: 5, repeats: 1}

    - name: pentadiagonal_large
      precisions: sdcz
      labels: []
      params: {m: 100, n: 100, kl: 2, ku: 2, ldab: 5, repeats: 1}

    - name: band_kl3_ku3
