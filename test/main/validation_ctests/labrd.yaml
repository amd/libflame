labrd:
  description: "Bidiagonal reduction with level 2 BLAS"
  api_group: "AUX"
  labels: []
  precisions: [s, d, c, z]
  param_order: [m, n, nb, lda, ldx, ldy, repeats]

  custom_paths:
    - name: single_element
      precisions: sdcz
      labels: []
      params: {m: 1, n: 1, lda: 1, ldx: 1, ldy: 1, repeats: 1, nb: 1}

    - name: kernel_sizes_2_16
      precisions: sdcz
      labels: []
      params: {repeats: 1, nb: 1, square: {range: [2, 16]}}

    - name: rectangular_tall
      precisions: sdcz
      labels: []
      params: {m: 50, n: 30, nb: 10, lda: 50, ldx: 50, ldy: 30, repeats: 1}

    - name: rectangular_wide
      precisions: sdcz
      labels: []
      params: {m: 30, n: 50, nb: 10, lda: 30, ldx: 30, ldy: 50, repeats: 1}

    - name: large_square
      precisions: sdcz
      labels: []
      params: {m: 128, n: 128, nb: 32, lda: 128, ldx: 128, ldy: 128, repeats: 1}