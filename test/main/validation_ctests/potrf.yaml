potrf:
  description: "Cholesky factorization"
  api_group: "LIN"
  labels: []
  precisions: [s, d, c, z]
  param_order: [uplo, n, lda, repeats]

  custom_paths:
    - name: single_element
      precisions: sdcz
      labels: []
      params: {uplo: U, n: 1, lda: 1, repeats: 1}

    - name: kernel_sizes_2_16
      precisions: sdcz
      labels: []
      params: {uplo: U, repeats: 1, square: {range: [2, 16]}}

    - name: upper_triangular
      precisions: sdcz
      labels: []
      params: {uplo: U, n: 50, lda: 50, repeats: 1}

    - name: lower_triangular
      precisions: sdcz
      labels: []
      params: {uplo: L, n: 50, lda: 50, repeats: 1}

    - name: medium_square
      precisions: sdcz
      labels: []
      params: {uplo: U, n: 128, lda: 128, repeats: 1}

    - name: large_square
      precisions: sdcz
      labels: []
      params: {uplo: U, n: 256, lda: 256, repeats: 1}

    - name: very_large
      precisions: sdcz
      labels: []
      params: {uplo: U, n: 512, lda: 512, repeats: 1}

    - name: kernel_sizes_2_16_lower
      precisions: sdcz
      labels: []
      params: {uplo: L, repeats: 1, square: {range: [2, 16]}}

    - name: small_boundary_n75
      precisions: d
      labels: []
      params: {uplo: U, n: 75, lda: 75, repeats: 1}