hetri_rook:
  description: "Hermitian inversion with rook pivoting"
  api_group: "LIN"
  labels: []
  precisions: [c, z]
  param_order: [uplo, n, lda, repeats]

  custom_paths:
    - name: single_element
      precisions: cz
      labels: []
      params: {uplo: U, n: 1, lda: 1, repeats: 1}

    - name: kernel_sizes_2_16
      precisions: cz
      labels: []
      params: {uplo: U, repeats: 1, square: {range: [2, 16]}}

    - name: upper_triangular
      precisions: cz
      labels: []
      params: {uplo: U, n: 50, lda: 50, repeats: 1}

    - name: medium_square
      precisions: cz
      labels: []
      params: {uplo: U, n: 128, lda: 128, repeats: 1}

    - name: large_square
      precisions: cz
      labels: []
      params: {uplo: U, n: 256, lda: 256, repeats: 1}

    - name: kernel_sizes_2_16_lower
      precisions: cz
      labels: []
      params: {uplo: L, repeats: 1, square: {range: [2, 16]}}