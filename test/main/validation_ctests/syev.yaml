syev:
  description: "Symmetric/Hermitian eigenvalue decomposition"
  api_group: "EIG"
  labels: []
  precisions: [s, d, c, z]
  param_order: [jobz, uplo, n, lda, lwork, repeats]

  custom_paths:
    - name: single_element
      precisions: sdcz
      labels: []
      params: {jobz: N, uplo: U, n: 1, lda: 1, lwork: -1, repeats: 1}

    - name: single_element_eigenvectors
      precisions: sdcz
      labels: []
      params: {jobz: V, uplo: U, n: 1, lda: 1, lwork: -1, repeats: 1}

    - name: kernel_sizes_2_16_eigenvalues
      precisions: sdcz
      labels: []
      params: {jobz: N, uplo: U, lwork: -1, repeats: 1, square: {range: [2, 16]}}

    - name: kernel_sizes_2_16_eigenvectors
      precisions: sdcz
      labels: []
      params: {jobz: V, uplo: U, lwork: -1, repeats: 1, square: {range: [2, 16]}}

    - name: kernel_sizes_2_16_eigenvalues_lower
      precisions: sdcz
      labels: []
      params: {jobz: N, uplo: L, lwork: -1, repeats: 1, square: {range: [2, 16]}}

    - name: kernel_sizes_2_16_eigenvectors_lower
      precisions: sdcz
      labels: []
      params: {jobz: V, uplo: L, lwork: -1, repeats: 1, square: {range: [2, 16]}}

    - name: medium_unblocked_eigenvalues_upper_n_20
      precisions: sdcz
      labels: []
      params: {jobz: N, uplo: U, n: 20, lda: 20, lwork: -1, repeats: 1}