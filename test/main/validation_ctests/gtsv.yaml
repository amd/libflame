gtsv:
  description: "Tridiagonal solve"
  api_group: "LIN"
  labels: []
  precisions: [s, d, c, z]
  param_order: [n, nrhs, ldb, repeats]

  custom_paths:
    - name: single_element
      precisions: sdcz
      labels: []
      params: {n: 1, nrhs: 1, ldb: 1, repeats: 1}

    - name: kernel_sizes_2_16
      precisions: sdcz
      labels: []
      params: {nrhs: 1, repeats: 1, square: {range: [2, 16]}}

    - name: square_medium
      precisions: sdcz
      labels: []
      params: {n: 50, nrhs: 1, ldb: 50, repeats: 1}

    - name: multiple_rhs
      precisions: sdcz
      labels: []
      params: {n: 64, nrhs: 10, ldb: 64, repeats: 1}

    - name: medium_square
      precisions: sdcz
      labels: []
      params: {n: 128, nrhs: 1, ldb: 128, repeats: 1}

    - name: large_square
      precisions: sdcz
      labels: []
      params: {n: 256, nrhs: 1, ldb: 256, repeats: 1}