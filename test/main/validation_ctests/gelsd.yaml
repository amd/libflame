gelsd:
  description: "Linear least squares using divide and conquer"
  api_group: "LIN"
  labels: []
  precisions: [s, d, c, z]
  param_order: [m, n, nrhs, lda, ldb, rcond, lwork, repeats]

  custom_paths:
    - name: single_element
      precisions: sdcz
      labels: []
      params: {m: 1, n: 1, nrhs: 1, lda: 1, ldb: 1, lwork: -1, repeats: 1, rcond: 0.0}

    - name: kernel_sizes_2_16
      precisions: sdcz
      labels: []
      params: {nrhs: 1, lwork: -1, repeats: 1, rcond: 0.0, square: {range: [2, 16]}}

    - name: square_medium
      precisions: sdcz
      labels: []
      params: {m: 50, n: 50, nrhs: 1, lda: 50, ldb: 50, rcond: 0.0, lwork: -1, repeats: 1}

    - name: rectangular_tall
      precisions: sdcz
      labels: []
      params: {m: 100, n: 50, nrhs: 1, lda: 100, ldb: 100, rcond: 0.0, lwork: -1, repeats: 1}

    - name: rectangular_wide
      precisions: sdcz
      labels: []
      params: {m: 50, n: 100, nrhs: 1, lda: 50, ldb: 100, rcond: 0.0, lwork: -1, repeats: 1}

    - name: multiple_rhs
      precisions: sdcz
      labels: []
      params: {m: 64, n: 64, nrhs: 10, lda: 64, ldb: 64, rcond: 0.0, lwork: -1, repeats: 1}

    - name: medium_square
      precisions: sdcz
      labels: []
      params: {m: 128, n: 128, nrhs: 1, lda: 128, ldb: 128, rcond: 0.0, lwork: -1, repeats: 1}

    - name: large_square
      precisions: sdcz
      labels: []
      params: {m: 256, n: 256, nrhs: 1, lda: 256, ldb: 256, rcond: 0.0, lwork: -1, repeats: 1}